<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Life - Emergent Behavior</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Particle Life Simulation</h1>
            <p class="subtitle">Emergent complexity from simple attraction/repulsion rules</p>
        </header>

        <div class="main-content">
            <canvas id="lifeCanvas"></canvas>

            <div class="controls">
                <div class="control-group">
                    <h3>Interaction Matrix</h3>
                    <div id="matrixGrid" class="matrix-grid"></div>
                    <button id="randomizeMatrix" class="btn-secondary">Randomize Rules</button>
                </div>

                <div class="control-group">
                    <h3>Physics</h3>
                    <div class="control-item">
                        <label>Attraction Force: <span id="forceValue">1.0</span></label>
                        <input type="range" id="force" min="0.1" max="3" step="0.1" value="1.0">
                    </div>
                    <div class="control-item">
                        <label>Interaction Radius: <span id="radiusValue">80</span></label>
                        <input type="range" id="radius" min="20" max="150" value="80">
                    </div>
                    <div class="control-item">
                        <label>Friction: <span id="frictionValue">0.05</span></label>
                        <input type="range" id="friction" min="0" max="0.2" step="0.01" value="0.05">
                    </div>
                    <div class="control-item">
                        <label>Particle Count: <span id="countValue">300</span></label>
                        <input type="range" id="particleCount" min="50" max="600" step="10" value="300">
                    </div>
                </div>

                <div class="control-group">
                    <h3>Presets</h3>
                    <div class="button-group">
                        <button class="preset-btn active" data-preset="default">Balanced</button>
                        <button class="preset-btn" data-preset="predator">Predator</button>
                        <button class="preset-btn" data-preset="clusters">Clusters</button>
                        <button class="preset-btn" data-preset="chains">Chains</button>
                        <button class="preset-btn" data-preset="symmetry">Symmetry</button>
                    </div>
                </div>

                <div class="control-group">
                    <h3>Visualization</h3>
                    <div class="checkbox-item">
                        <label><input type="checkbox" id="showTrails"> Show Trails</label>
                    </div>
                    <div class="checkbox-item">
                        <label><input type="checkbox" id="showRadius"> Show Interaction Radius</label>
                    </div>
                </div>

                <div class="control-group actions">
                    <button id="pauseBtn">Pause</button>
                    <button id="resetBtn">Reset</button>
                </div>

                <div class="stats">
                    <div class="stat-item">
                        <span>FPS:</span>
                        <span id="fps">60</span>
                    </div>
                    <div class="stat-item">
                        <span>Particles:</span>
                        <span id="particleDisplay">0</span>
                    </div>
                    <div class="stat-item">
                        <span>Avg Speed:</span>
                        <span id="avgSpeed">0</span>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Each color has different attraction/repulsion rules with other colors. Watch emergent patterns form.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
