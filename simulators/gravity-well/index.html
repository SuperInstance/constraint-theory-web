<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Well | Constraint Theory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav style="position: fixed; top: 0; left: 0; right: 0; background: rgba(10,10,20,0.9); padding: 10px 20px; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <a href="/" style="color: #00d9ff; text-decoration: none; font-size: 0.9rem;">← Back to Home</a>
    </nav>
    
    <div class="container">
        <header>
            <h1>Gravity Well Simulator</h1>
            <p class="subtitle">Gravitational Potential Fields as Geometric Constraints</p>
        </header>
        
        <div class="main-content">
            <div class="canvas-container">
                <canvas id="gravityCanvas"></canvas>
                <div class="stats-overlay">
                    <div class="stat-item">
                        <span class="stat-label">Bodies:</span>
                        <span id="bodyCount" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Energy:</span>
                        <span id="energyValue" class="stat-value">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Time:</span>
                        <span id="timeValue" class="stat-value">0</span>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <div class="control-section">
                    <h3>Simulation Controls</h3>
                    <div class="button-group">
                        <button id="playPauseBtn" class="btn btn-primary">▶ Play</button>
                        <button id="resetBtn" class="btn">↺ Reset</button>
                        <button id="clearBtn" class="btn">Clear</button>
                    </div>
                </div>
                
                <div class="control-section">
                    <h3>Physics</h3>
                    <div class="control">
                        <label>Gravity: <span id="gravityValue">9.8</span></label>
                        <input type="range" id="gravity" min="0" max="30" step="0.1" value="9.8">
                    </div>
                    <div class="control">
                        <label>Time Scale: <span id="timeScaleValue">1.0</span>x</label>
                        <input type="range" id="timeScale" min="0.1" max="3" step="0.1" value="1.0">
                    </div>
                    <div class="control">
                        <label>Trail Length: <span id="trailLengthValue">100</span></label>
                        <input type="range" id="trailLength" min="0" max="500" step="10" value="100">
                    </div>
                </div>
                
                <div class="control-section">
                    <h3>Visualization</h3>
                    <div class="control">
                        <label>
                            <input type="checkbox" id="showField" checked>
                            Show Potential Field
                        </label>
                    </div>
                    <div class="control">
                        <label>
                            <input type="checkbox" id="showTrails" checked>
                            Show Trails
                        </label>
                    </div>
                    <div class="control">
                        <label>
                            <input type="checkbox" id="showVectors">
                            Show Velocity Vectors
                        </label>
                    </div>
                    <div class="control">
                        <label>
                            <input type="checkbox" id="showConstraints">
                            Show Constraint Lines
                        </label>
                    </div>
                </div>
                
                <div class="control-section">
                    <h3>Presets</h3>
                    <div class="preset-grid">
                        <button class="btn preset-btn active" data-preset="well">Gravity Well</button>
                        <button class="btn preset-btn" data-preset="binary">Binary Stars</button>
                        <button class="btn preset-btn" data-preset="orbit">Orbital System</button>
                        <button class="btn preset-btn" data-preset="grid">Grid Drop</button>
                    </div>
                </div>
                
                <div class="control-section">
                    <h3>Interaction</h3>
                    <p class="help-text">Click to add mass. Drag to set velocity. Scroll to zoom.</p>
                    <div class="control">
                        <label>Mass: <span id="massValue">100</span></label>
                        <input type="range" id="mass" min="10" max="500" step="10" value="100">
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
