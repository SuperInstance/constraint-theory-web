<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring-Mass Constraint System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Spring-Mass Constraint System</h1>
            <p class="subtitle">Interactive demonstration of Hooke's Law constraints</p>
        </header>

        <div class="main-content">
            <canvas id="springCanvas"></canvas>

            <div class="controls">
                <div class="control-group">
                    <h3>Physics Parameters</h3>
                    <div class="control-item">
                        <label>Stiffness: <span id="stiffnessValue">50</span></label>
                        <input type="range" id="stiffness" min="1" max="200" value="50">
                    </div>
                    <div class="control-item">
                        <label>Damping: <span id="dampingValue">0.98</span></label>
                        <input type="range" id="damping" min="0.9" max="1" step="0.01" value="0.98">
                    </div>
                    <div class="control-item">
                        <label>Gravity: <span id="gravityValue">200</span></label>
                        <input type="range" id="gravity" min="0" max="500" value="200">
                    </div>
                    <div class="control-item">
                        <label>Rest Length Factor: <span id="restLengthValue">1.0</span></label>
                        <input type="range" id="restLength" min="0.5" max="2" step="0.1" value="1.0">
                    </div>
                </div>

                <div class="control-group">
                    <h3>Visualization</h3>
                    <div class="checkbox-item">
                        <label><input type="checkbox" id="showForces" checked> Show Force Vectors</label>
                    </div>
                    <div class="checkbox-item">
                        <label><input type="checkbox" id="showSprings" checked> Show Springs</label>
                    </div>
                    <div class="checkbox-item">
                        <label><input type="checkbox" id="showTrails"> Show Trails</label>
                    </div>
                    <div class="checkbox-item">
                        <label><input type="checkbox" id="showEnergy"> Show Energy Graph</label>
                    </div>
                </div>

                <div class="control-group">
                    <h3>Presets</h3>
                    <div class="button-group">
                        <button class="preset-btn active" data-preset="chain">Chain</button>
                        <button class="preset-btn" data-preset="bridge">Bridge</button>
                        <button class="preset-btn" data-preset="trampoline">Trampoline</button>
                        <button class="preset-btn" data-preset="spider">Spider Web</button>
                        <button class="preset-btn" data-preset="pendulum">Pendulum</button>
                    </div>
                </div>

                <div class="control-group actions">
                    <button id="pauseBtn">Pause</button>
                    <button id="resetBtn">Reset</button>
                </div>

                <div class="stats">
                    <div class="stat-item">
                        <span>Particles:</span>
                        <span id="particleCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span>Springs:</span>
                        <span id="springCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span>Total Energy:</span>
                        <span id="totalEnergy">0</span>
                    </div>
                    <div class="stat-item">
                        <span>FPS:</span>
                        <span id="fps">60</span>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>Click and drag particles to interact. Click empty space to add particles.</p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
