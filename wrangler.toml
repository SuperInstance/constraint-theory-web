# Cloudflare Pages configuration for constraint-theory-web
# Deploy with: wrangler pages deploy . --project-name constraint-theory-web

name = "constraint-theory-web"
compatibility_date = "2024-01-01"
pages_build_output_dir = "."

# Security headers for all requests
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
X-XSS-Protection = "1; mode=block"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.constraint-theory.superinstance.ai"

# JavaScript files - Long cache, immutable
[[headers]]
for = "/*.js"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# CSS files - Long cache, immutable
[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# HTML files - Short cache, revalidate
[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# WASM files - Long cache, immutable
[[headers]]
for = "/*.wasm"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# PNG images
[[headers]]
for = "/*.png"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# JPG images
[[headers]]
for = "/*.jpg"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# JSON files
[[headers]]
for = "/*.json"
[headers.values]
Cache-Control = "public, max-age=300"
